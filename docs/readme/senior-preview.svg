<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Senior experience screenshot placeholder</title><desc id="desc">A stylized Grandberry Senior interface placeholder with large check-in, note, and memory cards.</desc>
  <rect width="1000" height="520" rx="34" fill="#fbf7f0"/><rect x="70" y="42" width="860" height="436" rx="28" fill="#fffdf9" stroke="#eadadd" stroke-width="3"/>
  <rect x="110" y="80" width="58" height="58" rx="17" fill="#9d4660"/><text x="139" y="119" text-anchor="middle" font-family="Georgia,serif" font-size="33" fill="#fff">G</text>
  <text x="500" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="35" font-weight="700" fill="#352d2d">Good morning, Margaret.</text>
  <rect x="246" y="150" width="508" height="72" rx="22" fill="#9d4660"/><text x="500" y="195" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="800" fill="#fff">♡  Start my morning check-in</text>
  <rect x="110" y="260" width="360" height="160" rx="22" fill="#f5e5e8"/><text x="140" y="300" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#7f354e">FAMILY CORNER</text><text x="140" y="340" font-family="Georgia,serif" font-size="27" font-weight="700" fill="#352d2d">A note from Maya</text><rect x="140" y="365" width="190" height="38" rx="19" fill="#fff"/><text x="235" y="390" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#7f354e">▶ Read it to me</text>
  <rect x="500" y="260" width="390" height="160" rx="22" fill="#e7eee8"/><text x="530" y="300" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#405c49">MEMORY MOMENT</text><text x="530" y="340" font-family="Georgia,serif" font-size="27" font-weight="700" fill="#352d2d">Share a family story</text><rect x="530" y="365" width="205" height="38" rx="19" fill="#67806f"/><text x="632" y="390" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">● Start my story</text>
