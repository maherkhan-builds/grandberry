    <g><rect x="815" y="68" width="290" height="194" rx="28" fill="#fffdf9" stroke="#ecdcae" stroke-width="3"/><circle cx="960" cy="130" r="34" fill="#d7a84b"/><text x="960" y="140" font-size="25" fill="#fff">♪</text><text x="960" y="196" font-size="24" font-weight="800" fill="#352d2d">Keep stories close</text><text x="960" y="226" font-size="16" fill="#706667">Temporary Memory Moments</text></g>
